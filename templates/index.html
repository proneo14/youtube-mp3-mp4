<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube to MP3 / MP4</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: #161b22;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 540px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
      border: 1px solid #30363d;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #58d68d, #2ecc71);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 32px;
      font-size: .95rem;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: .9rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #30363d;
      border-radius: 10px;
      background: #0d1117;
      color: #e6edf3;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }

    input[type="text"]:focus { border-color: #2ecc71; }

    .format-group {
      display: flex;
      gap: 12px;
      margin: 20px 0 28px;
    }

    .format-option { flex: 1; }
    .format-option input { display: none; }

    .format-option label {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      border: 2px solid #30363d;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1rem;
      transition: all .2s;
      background: #0d1117;
    }

    .format-option input:checked + label {
      border-color: #2ecc71;
      background: #1a2e1a;
      color: #58d68d;
    }

    .format-option label:hover { border-color: #484f58; }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s;
    }

    button:hover { opacity: .9; }
    button:disabled { opacity: .5; cursor: not-allowed; }

    /* Preview card */
    .preview {
      display: none;
      margin-top: 24px;
      border: 1px solid #30363d;
      border-radius: 12px;
      overflow: hidden;
      background: #0d1117;
    }

    .preview img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
    }

    .preview-info {
      padding: 16px;
    }

    .preview-title {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 6px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .preview-meta {
      color: #8b949e;
      font-size: .85rem;
      display: flex;
      gap: 16px;
    }

    #downloadBtn {
      margin-top: 16px;
    }

    .status {
      margin-top: 20px;
      text-align: center;
      min-height: 24px;
      font-size: .9rem;
    }

    .status.error { color: #e74c3c; }
    .status.info  { color: #8b949e; }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 3px solid #30363d;
      border-top-color: #2ecc71;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>YT Downloader</h1>
    <p class="subtitle">Paste a YouTube link, pick a format, and download.</p>

    <label for="url">YouTube URL</label>
    <input type="text" id="url" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off" />

    <div class="format-group">
      <div class="format-option">
        <input type="radio" name="format" id="mp3" value="mp3" checked />
        <label for="mp3">🎵 MP3</label>
      </div>
      <div class="format-option">
        <input type="radio" name="format" id="mp4" value="mp4" />
        <label for="mp4">🎬 MP4</label>
      </div>
    </div>

    <div class="preview" id="preview">
      <img id="thumb" src="" alt="Thumbnail" />
      <div class="preview-info">
        <div class="preview-title" id="vidTitle"></div>
        <div class="preview-meta">
          <span id="vidChannel"></span>
          <span id="vidDuration"></span>
        </div>
      </div>
      <div style="padding: 0 16px 16px;">
        <button id="downloadBtn">Download</button>
      </div>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script>
    const downloadBtn = document.getElementById('downloadBtn');
    const urlEl       = document.getElementById('url');
    const status      = document.getElementById('status');
    const previewCard = document.getElementById('preview');

    let currentUrl = '';
    let debounceTimer = null;
    const ytRegex = /^(https?:\/\/)?(www\.)?(youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)[\w\-]{11}/;

    // Auto-preview on paste or input
    urlEl.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      const url = urlEl.value.trim();
      if (!ytRegex.test(url)) {
        currentUrl = '';
        previewCard.style.display = 'none';
        showStatus('', false);
        return;
      }
      debounceTimer = setTimeout(() => fetchPreview(url), 400);
    });

    // Re-fetch preview when format changes
    document.querySelectorAll('input[name="format"]').forEach(radio => {
      radio.addEventListener('change', () => {
        if (currentUrl) fetchPreview(currentUrl, true);
      });
    });

    async function fetchPreview(url, force = false) {
      if (url === currentUrl && !force) return;

      previewCard.style.display = 'none';
      showStatus('<span class="spinner"></span> Fetching video info…', false);

      try {
        const res = await fetch('/preview', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
        });

        const data = await res.json();
        if (!res.ok) { showStatus(data.error || 'Failed to fetch info.', true); return; }

        currentUrl = url;
        document.getElementById('thumb').src = data.thumbnail;
        document.getElementById('vidTitle').textContent = data.title;
        document.getElementById('vidChannel').textContent = data.channel;
        document.getElementById('vidDuration').textContent = data.duration;

        previewCard.style.display = 'block';
        showStatus('', false);
      } catch (e) {
        showStatus('Network error — is the server running?', true);
      }
    }

    // Step 2: Download
    downloadBtn.addEventListener('click', async () => {
      const fmt = document.querySelector('input[name="format"]:checked').value;

      downloadBtn.disabled = true;
      showStatus('<span class="spinner"></span> Converting to ' + fmt.toUpperCase() + '… this may take a moment.', false);

      try {
        const res = await fetch('/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: currentUrl, format: fmt }),
        });

        if (!res.ok) {
          const err = await res.json();
          showStatus(err.error || 'Download failed.', true);
          return;
        }

        const blob = await res.blob();
        const disposition = res.headers.get('Content-Disposition') || '';
        let filename = `download.${fmt}`;
        const match = disposition.match(/filename\*?=(?:UTF-8''|"?)([^";]+)/i);
        if (match) filename = decodeURIComponent(match[1].replace(/"/g, ''));

        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(a.href);

        showStatus('Done! Your file is downloading.', false);
      } catch (e) {
        showStatus('Network error — is the server running?', true);
      } finally {
        downloadBtn.disabled = false;
      }
    });

    function showStatus(msg, isError) {
      status.innerHTML = msg;
      status.className = 'status ' + (isError ? 'error' : 'info');
    }
  </script>
</body>
</html>
